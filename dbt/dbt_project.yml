# dbt Project — Orange Money Pipeline
# Databricks adapter with Unity Catalog

name: 'orange_money_pipeline'
version: '1.0.0'
config-version: 2

profile: 'orange_money'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

docs-paths: ["docs"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ═══════════════════════════════════════════════════════════════════
# Model Configuration
# ═══════════════════════════════════════════════════════════════════

models:
  orange_money_pipeline:
    bronze:
      +schema: bronze
      +materialized: view
      +tags: ["bronze", "raw"]

    silver:
      +schema: silver
      +materialized: table
      +tags: ["silver", "normalized"]
      +file_format: delta

    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold", "aggregated"]
      +file_format: delta

# ═══════════════════════════════════════════════════════════════════
# Test Configuration
# ═══════════════════════════════════════════════════════════════════

tests:
  +store_failures: true
  +schema: test_failures

# ═══════════════════════════════════════════════════════════════════
# Query Comment
# ═══════════════════════════════════════════════════════════════════

query-comment:
  comment: "Generated by dbt for Orange Money Pipeline @ XamXam Graph"
  append: true
